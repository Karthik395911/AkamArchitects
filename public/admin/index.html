<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AKAM Architects - Content Admin</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script>
      // The site's compiled CSS is content-hashed and changes on every build,
      // so its filename can't be hardcoded here. Pull the current one from
      // the live homepage instead, then hand it to Decap's preview iframe.
      fetch("/")
        .then((res) => res.text())
        .then((html) => {
          const match = html.match(/<link rel="stylesheet"[^>]*href="([^"]+\/Layout\.[^"]+\.css)"/);
          if (match) {
            CMS.registerPreviewStyle(match[1]);
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
